services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stock_research
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    image: python:3.12-slim
    working_dir: /app
    command: bash -lc "pip install -e . && uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://stock:stock@postgres:5432/stock_research
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: bash -lc "pip install -e . && celery -A services.jobs.celery_app.celery_app worker --loglevel=info"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://stock:stock@postgres:5432/stock_research
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ..:/app
    depends_on:
      - postgres
      - redis

  beat:
    image: python:3.12-slim
    working_dir: /app
    command: bash -lc "pip install -e . && celery -A services.jobs.celery_app.celery_app beat --loglevel=info"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://stock:stock@postgres:5432/stock_research
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ..:/app
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
